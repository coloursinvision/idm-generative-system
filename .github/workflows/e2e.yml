# .github/workflows/e2e.yml
#
# E2E browser tests — runs Playwright against the Vite dev server
# with mocked API routes (no backend required).
#
# Trigger: push/PR to develop, main, hotfix/*
# Runs AFTER unit tests pass (separate workflow or add as job in ci.yml)

name: E2E Tests

on:
  push:
    branches: [develop, main, "hotfix/*"]
  pull_request:
    branches: [develop, main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npm run e2e:install -- --with-deps chromium firefox

      - name: Run E2E tests
        working-directory: frontend
        run: npm run e2e -- --project=chromium --project=firefox
        env:
          CI: true

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
