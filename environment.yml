name: idm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.26.0
  - scipy>=1.11.0
  - matplotlib>=3.8.0
  - jupyter
  - ipykernel

  - pip:
    # Audio / DSP
    - soundfile>=0.12.0
    - librosa>=0.10.0
    - pydub>=0.25.0

    # Backend
    - fastapi>=0.110.0
    - uvicorn[standard]>=0.27.0
    - pydantic>=2.0.0
    - python-dotenv>=1.0.0

    # Vector DB
    - qdrant-client>=1.8.0

    # LLM
    - openai>=1.0.0

    # ML
    - scikit-learn>=1.4.0
    - xgboost>=2.0.0
    - mlflow>=2.11.0
    - pandas>=2.0.0

    # LLM Monitoring
    - langfuse>=2.0.0

    # Auxiliary UI
    - streamlit>=1.32.0
